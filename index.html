<!doctype html>

    <meta charset="UTF-8" />

    <!-- Referrer policy: AdSense Privacy & messaging may require cross-origin Referrer to be sent -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!--
      Google Consent Mode defaults MUST run before any gtag.js / AdSense request.
      AdSense code must be present on the page for European regulations (Funding Choices) messages
      to display — see https://support.google.com/adsense/answer/10960768
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      // wait_for_update: async CMPs (AdSense Privacy & messaging / TCF) must update consent
      // before tags proceed — see https://developers.google.com/tag-platform/security/guides/consent
      gtag("consent", "default", {
        ad_storage: "denied",
        analytics_storage: "denied",
        ad_user_data: "denied",
        ad_personalization: "denied",
        functionality_storage: "granted",
        security_storage: "granted",
        personalization_storage: "denied",
        wait_for_update: 3000,
      });
    </script>
    <!-- AdSense before gtag: Funding Choices / EU message attaches via the ad tag stack -->
    <script>
      window.adsbygoogle = window.adsbygoogle || [];
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4575124953371835" crossorigin="anonymous"></script>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4V1LPN0KS0"></script>
    <script>
      gtag("js", new Date());
      gtag("config", "G-4V1LPN0KS0");
    </script>
    <title>Atom Beacon™ — Nuclear Energy News, Education & Commentary</title>

    <!-- WebSite structured data with search -->

    }
