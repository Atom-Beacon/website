    <!-- Organization structured data -->

    {
      "@context": "https://schema.org",
      "@type": "Organization",

      "sameAs": []

    <!-- WebSite structured data with search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Atom Beacon",
      "url": "https://atombeacon.dev",
      "description": "Nuclear energy news, education, and commentary",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://atombeacon.dev/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- BreadcrumbList structured data (homepage) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
