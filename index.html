<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google scripts are loaded after consent in src/lib/consent.ts -->
    <title>Atom Beacon™ — Nuclear Energy News, Education & Commentary</title>
    <meta name="description" content="Your trusted source for nuclear energy news, education, and thoughtful commentary. Promoting clean nuclear energy as part of a diverse energy future." />
    <meta name="author" content="ADGL Enterprises, LLC" />
    <link rel="canonical" href="https://atombeacon.com" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <meta property="og:title" content="Atom Beacon™ — Nuclear Energy News & Education" />
    <meta property="og:description" content="Your trusted source for nuclear energy news, education, and thoughtful commentary." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://atombeacon.com/og_image1.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="665" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://atombeacon.com/og_image1.jpg" />

    <!-- Organization structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Atom Beacon",
      "legalName": "ADGL Enterprises, LLC",
      "url": "https://atombeacon.com",
      "description": "Nuclear energy news, education, and commentary — promoting clean nuclear energy as part of a diverse energy future. Atom Beacon™ is a trademark of ADGL Enterprises, LLC.",
      "logo": "https://atombeacon.com/placeholder.svg",
      "sameAs": []
    }
    </script>

    <!-- WebSite structured data with search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Atom Beacon",
      "url": "https://atombeacon.com",
      "description": "Nuclear energy news, education, and commentary",
      "copyrightHolder": {
        "@type": "Organization",
        "name": "ADGL Enterprises, LLC"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://atombeacon.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- BreadcrumbList structured data (homepage) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://atombeacon.com/" },
        { "@type": "ListItem", "position": 2, "name": "News", "item": "https://atombeacon.com/news" },
        { "@type": "ListItem", "position": 3, "name": "Learn", "item": "https://atombeacon.com/learn" },
        { "@type": "ListItem", "position": 4, "name": "Business", "item": "https://atombeacon.com/business" },
        { "@type": "ListItem", "position": 5, "name": "Blog", "item": "https://atombeacon.com/blog" },
        { "@type": "ListItem", "position": 6, "name": "Kids Zone", "item": "https://atombeacon.com/kids" }
      ]
    }
    </script>

    <!-- AdSense script is loaded after consent in src/lib/consent.ts -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
